[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]

[fuzz]
runs = 256

[invariant]
runs = 128

[rpc_endpoints]
unichain_testnet = "https://sepolia.unichain.org"
reactive          = "https://lasna-rpc.rnk.dev/"

[etherscan]
unichain_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://unichain-sepolia.blockscout.com/api" }
